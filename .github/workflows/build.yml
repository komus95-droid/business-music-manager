name: Build BMM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps --prefer-offline --no-audit --no-fund
        timeout-minutes: 15
      - name: Build renderer
        run: npx vite build
      - name: Build main
        run: npx tsc --project tsconfig.electron.json
      - name: Package
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BusinessMusicManager-Windows
          path: release/*.exe
          if-no-files-found: warn
